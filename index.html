<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名チャット</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0b0b0b; color: #efefef; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .text-accent { color: #ff3e60; }
        .bg-accent { background-color: #ff3e60; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 14px; position: relative; line-height: 1.5; }
        .bubble-other { background-color: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        .bubble-me { background-color: #ff3e60; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .timestamp { font-size: 10px; opacity: 0.6; margin-top: 4px; display: block; }
        #name-modal { background-color: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .admin-label { font-size: 9px; color: #fbbf24; border: 1px solid #fbbf24; padding: 0 4px; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="name-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="bg-[#1a1a1a] border border-gray-800 w-full max-w-sm p-8 rounded-3xl shadow-2xl text-center">
            <h2 class="text-2xl font-bold mb-6 text-accent">匿名 チャット</h2>
            <input type="text" id="name-input-field" placeholder="名前を入力..." 
                class="w-full bg-black border border-gray-700 rounded-xl px-4 py-3 mb-4 outline-none focus:border-accent transition text-center text-white">
            <button onclick="saveName()" class="w-full bg-accent text-white font-bold py-3 rounded-xl hover:opacity-90 transition">
                入室する
            </button>
        </div>
    </div>

    <nav class="bg-black border-b border-gray-800 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="text-xl font-bold tracking-tighter cursor-default">匿名 <span class="text-accent">チャット
            </span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <div id="display-name" class="text-xs text-gray-400 font-medium bg-[#262626] px-3 py-1 rounded-full cursor-pointer hover:bg-gray-700" onclick="resetName()"></div>
            <div id="admin-indicator" class="hidden text-[10px] bg-yellow-600 text-white px-2 py-0.5 rounded font-bold">ADMIN</div>
        </div>
    </nav>

    <div id="chat-box" class="chat-container"></div>

    <div class="p-4 bg-black border-t border-gray-800">
        <div class="container mx-auto max-w-4xl flex items-end gap-3">
            <div class="flex-1 bg-[#1a1a1a] border border-gray-700 rounded-2xl p-2 focus-within:border-accent transition">
                <textarea id="message-input" rows="1" placeholder="メッセージを入力..." 
                    class="w-full bg-transparent border-none outline-none px-3 py-1 text-sm resize-none text-white"></textarea>
            </div>
            <button onclick="sendMessage()" class="bg-accent text-white p-3 rounded-full hover:scale-105 transition active:scale-95">
                <i data-lucide="send-horizontal" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <div class="fixed bottom-0 right-0 w-10 h-10 cursor-default opacity-0" onclick="adminLogin()"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYVRB8L-nG7pW-4YACGo01grBJoXYHx9c",
            authDomain: "missoota-4ca5a.firebaseapp.com",
            projectId: "missoota-4ca5a",
            storageBucket: "missoota-4ca5a.firebasestorage.app",
            messagingSenderId: "1057253336204",
            appId: "1:1057253336204:web:792cd8560d6b3673f307a9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let userName = localStorage.getItem('ota_chat_name');
        let isAdmin = false;
        const myUserId = 'id_' + Math.random().toString(36).substr(2, 9);

        // 管理者ログイン
        window.adminLogin = () => {
            const pass = prompt("管理者パスワードを入力:");
            if (pass === "63524545") { // ここでパスワードを設定
                isAdmin = true;
                document.getElementById('admin-indicator').classList.remove('hidden');
                alert("管理者権限を取得しました。IP表示と削除が可能です。");
            }
        };

        // ショートカットキー (Ctrl + L) で管理者ログイン
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                adminLogin();
            }
        });

        // IP取得
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch { return "0.0.0.0"; }
        }

        window.onload = () => {
            if (userName) {
                document.getElementById('name-modal').classList.add('hidden');
                document.getElementById('display-name').innerText = `👤 ${userName}`;
            }
            lucide.createIcons();
        };

        window.saveName = () => {
            const val = document.getElementById('name-input-field').value.trim();
            if (val) {
                userName = val;
                localStorage.setItem('ota_chat_name', val);
                document.getElementById('name-modal').classList.add('hidden');
                document.getElementById('display-name').innerText = `👤 ${userName}`;
            }
        };

        window.resetName = () => {
            if(confirm("名前をリセットしますか？")) {
                localStorage.removeItem('ota_chat_name');
                location.reload();
            }
        };

        window.deleteMessage = async (id) => {
            if (isAdmin && confirm("このメッセージを削除しますか？")) {
                await deleteDoc(doc(db, "anonymous_chat", id));
            }
        };

        window.sendMessage = async () => {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !userName) return;

            const ip = await getIP();

            try {
                await addDoc(collection(db, "anonymous_chat"), {
                    userName: userName,
                    userId: myUserId,
                    text: text,
                    userIP: ip,
                    createdAt: serverTimestamp()
                });
                input.value = "";
                input.style.height = 'auto';
            } catch (e) { console.error(e); }
        };

        const q = query(collection(db, "anonymous_chat"), orderBy("createdAt", "asc"), limit(100));
        onSnapshot(q, (snapshot) => {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const isMe = data.userId === myUserId;
                const time = data.createdAt ? new Date(data.createdAt.toDate()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";

                const msgDiv = document.createElement('div');
                msgDiv.className = isMe ? 'bubble bubble-me animate-fade-in' : 'bubble bubble-other animate-fade-in';
                
                // 管理者用情報の組み立て
                const adminTools = isAdmin ? `
                    <div class="mt-2 pt-1 border-t border-gray-700 text-[9px] text-yellow-500 flex justify-between items-center">
                        <span>IP: ${data.userIP || 'Unknown'}</span>
                        <button onclick="deleteMessage('${docSnap.id}')" class="text-red-400 font-bold hover:underline">削除</button>
                    </div>
                ` : '';

                msgDiv.innerHTML = `
                    <div class="text-[10px] ${isMe ? 'text-pink-200' : 'text-accent'} mb-1 font-bold">
                        ${data.userName || '名無し'}
                    </div>
                    <div class="break-words">${data.text}</div>
                    <span class="timestamp text-right">${time}</span>
                    ${adminTools}
                `;
                chatBox.appendChild(msgDiv);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        document.getElementById('message-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
