<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISS太田 - Private Channel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0b0b0b; color: #efefef; font-family: sans-serif; overflow-x: hidden; }
        .text-accent { color: #ff3e60; }
        .video-thumbnail:hover img { transform: scale(1.05); transition: 0.4s; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0b0b; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff3e60; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .bg-player { background-color: #000; position: relative; padding-bottom: 56.25%; height: 0; }
        .bg-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .tag-style { background-color: #262626; border-radius: 4px; padding: 4px 10px; font-size: 12px; color: #ccc; transition: 0.2s; cursor: pointer; }
        .tag-style:hover { background-color: #333; color: #fff; }
        .animate-fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-black border-b border-gray-800 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center space-x-6">
            <div class="text-2xl font-bold tracking-tighter cursor-pointer select-none" onclick="closePlayer()">
                MISS<span class="text-accent">太田</span>
            </div>
            <div class="hidden md:flex space-x-4 text-sm font-medium text-gray-400">
                <a href="#" class="hover:text-accent">西野がライブ配信中</a>
                <a href="#" class="hover:text-accent text-white" onclick="closePlayer()">動画一覧</a>
                <a href="#" class="hover:text-accent">はるちんTV</a>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <i data-lucide="search" class="w-5 h-5 cursor-pointer hover:text-accent"></i>
            <div class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center text-[10px] font-bold cursor-pointer">JP</div>
        </div>
    </nav>

    <div id="home-content">
        <section class="flex flex-col items-center py-12 px-4 bg-[#0f0f0f]">
            <h2 class="text-3xl font-light mb-6">任意の検索 <span class="text-accent italic font-bold text-4xl">太田</span></h2>
            <div class="relative w-full max-w-2xl">
                <input type="text" id="search-input" placeholder="任意の検索..." 
                       class="w-full bg-white text-black py-3 px-5 rounded-md outline-none pr-16 text-lg focus:ring-4 focus:ring-red-500/30 transition-all">
                <button onclick="searchVideos()" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 hover:text-black">
                    <i data-lucide="search" class="w-6 h-6"></i>
                </button>
            </div>
        </section>

        <main class="container mx-auto px-4 mt-10">
            <div class="flex justify-between items-center mb-6 border-l-4 border-accent pl-3">
                <h3 class="text-xl font-bold">あなたにおすすめ</h3>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="video-grid"></div>
        </main>
    </div>

    <div id="player-content" class="hidden container mx-auto px-4 pt-6 animate-fade-in">
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="flex-1">
                <div class="bg-player rounded-lg overflow-hidden shadow-2xl border border-gray-800">
                    <div id="yt-player"></div>
                </div>

                <div class="mt-6">
                    <h1 id="player-title" class="text-2xl font-bold"></h1>
                    <div class="flex flex-wrap items-center justify-between mt-4 pb-4 border-b border-gray-800 text-sm text-gray-400 gap-4">
                        <div class="flex items-center space-x-4">
                            <span><i data-lucide="eye" class="w-4 h-4 inline mr-1"></i> <span id="view-count">0</span> Views</span>
                            <span><i data-lucide="calendar" class="w-4 h-4 inline mr-1"></i> <span id="video-date"></span></span>
                        </div>
                        <div class="flex items-center space-x-6">
                            <button onclick="handleVote('likes')" class="flex items-center hover:text-accent transition bg-[#262626] px-3 py-1 rounded-full">
                                <i data-lucide="thumbs-up" class="w-5 h-5 mr-1 text-accent"></i> <span id="like-count">0</span>
                            </button>
                            <button onclick="handleVote('dislikes')" class="flex items-center hover:text-white transition bg-[#262626] px-3 py-1 rounded-full">
                                <i data-lucide="thumbs-down" class="w-5 h-5 mr-1"></i> <span id="dislike-count">0</span>
                            </button>
                            <button onclick="shareVideo()" class="flex items-center hover:text-accent transition"><i data-lucide="share-2" class="w-5 h-5 mr-1"></i> 共有</button>
                        </div>
                    </div>
                    <div id="tag-container" class="mt-4 flex flex-wrap gap-2"></div>

                    <div class="mt-10 bg-[#141414] rounded-lg p-6 border border-gray-800">
                        <h3 class="text-lg font-bold mb-6">コメント (<span id="comment-count">0</span>)</h3>
                        <div class="flex gap-4 mb-8">
                            <div class="w-10 h-10 rounded-full bg-gray-700 flex-shrink-0 flex items-center justify-center font-bold">U</div>
                            <div class="flex-1">
                                <textarea id="comment-input" rows="2" class="w-full bg-[#0b0b0b] border border-gray-700 rounded p-3 text-sm focus:border-accent outline-none" placeholder="公開コメントを入力..."></textarea>
                                <div class="flex justify-end mt-2">
                                    <button onclick="postComment()" class="bg-accent hover:opacity-80 text-white text-xs font-bold py-2 px-6 rounded transition">投稿</button>
                                </div>
                            </div>
                        </div>
                        <div id="comment-list" class="space-y-6"></div>
                    </div>
                </div>
            </div>
            <div class="w-full lg:w-[350px]">
                <h3 class="text-lg font-bold mb-4 border-l-4 border-accent pl-3">関連動画</h3>
                <div id="side-grid" class="flex flex-col gap-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYVRB8L-nG7pW-4YACGo01grBJoXYHx9c",
            authDomain: "missoota-4ca5a.firebaseapp.com",
            projectId: "missoota-4ca5a",
            storageBucket: "missoota-4ca5a.firebasestorage.app",
            messagingSenderId: "1057253336204",
            appId: "1:1057253336204:web:792cd8560d6b3673f307a9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let videoData = [
            { id: "v1", title: "みづきの早飲みヤクルトチャレンジ", time: "2:27", date: "2026/03/30", thumb: "", src: "Lb02rL4nQYU", tags: ["みづき", "チャレンジ", "なぜ彼女がいる？"] },
            { id: "v2", title: "みづきの鬼レンチャン【1曲目】", time: "0:21", date: "2026/03/30", thumb: "", src: "uN42Aax-AyI", tags: ["成功でフェラ", "みづき"] },
            { id: "v3", title: "中学生男子のお悩み相談室‼", time: "02:33", date: "2026/03/30", thumb: "みづき2サムネ.png", src: "_jfGAgT2l2I", tags: ["相談", "3days"] }
        ];

        let currentId = null;
        let ytPlayer = null;
        let unsubStats = null;
        let unsubComments = null;
        let statsUnsubs = [];

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = () => { console.log("YouTube API Ready"); };

        function renderHome(data) {
            const grid = document.getElementById('video-grid');
            statsUnsubs.forEach(unsub => unsub());
            statsUnsubs = [];

            grid.innerHTML = data.map(v => {
                const thumbImg = v.thumb ? `<img src="${v.thumb}" class="w-full h-full object-cover">` 
                                         : `<img src="https://img.youtube.com/vi/${v.src}/mqdefault.jpg" class="w-full h-full object-cover">`;
                return `
                <div class="group cursor-pointer animate-fade-in" onclick="window.playVideo('${v.id}')">
                    <div class="video-thumbnail relative aspect-video overflow-hidden rounded-lg bg-gray-900 border border-gray-800">
                        ${thumbImg}
                        <span class="absolute bottom-2 right-2 bg-black/80 text-[11px] px-1.5 py-0.5 rounded font-bold">${v.time}</span>
                    </div>
                    <div class="mt-3">
                        <h4 class="text-sm font-semibold line-clamp-2 group-hover:text-accent transition-colors">${v.title}</h4>
                        <div class="text-[11px] text-gray-500 mt-1 flex items-center space-x-2">
                            <span><span id="home-views-${v.id}">0</span> views</span>
                            <span>•</span>
                            <span><span id="home-rate-${v.id}">0</span>% like</span>
                        </div>
                    </div>
                </div>`;
            }).join('');

            data.forEach(v => {
                const unsub = onSnapshot(doc(db, "videoStats", v.id), (snap) => {
                    const viewsEl = document.getElementById(`home-views-${v.id}`);
                    const rateEl = document.getElementById(`home-rate-${v.id}`);
                    if (snap.exists() && viewsEl && rateEl) {
                        const s = snap.data();
                        const likes = s.likes || 0;
                        const total = (s.likes || 0) + (s.dislikes || 0);
                        viewsEl.innerText = (s.views || 0).toLocaleString();
                        rateEl.innerText = total > 0 ? Math.round((likes / total) * 100) : 0;
                    }
                });
                statsUnsubs.push(unsub);
            });
            lucide.createIcons();
        }

        window.playVideo = async function(id) {
            const v = videoData.find(v => v.id === id);
            if(!v) return;
            currentId = id;
            
            document.getElementById('player-title').innerText = v.title;
            document.getElementById('video-date').innerText = v.date;
            document.getElementById('tag-container').innerHTML = v.tags.map(t => `<span class="tag-style">#${t}</span>`).join('');
            
            document.getElementById('home-content').classList.add('hidden');
            document.getElementById('player-content').classList.remove('hidden');

            if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
                ytPlayer.loadVideoById(v.src);
            } else {
                ytPlayer = new YT.Player('yt-player', {
                    height: '100%',
                    width: '100%',
                    videoId: v.src,
                    playerVars: { 'autoplay': 1, 'rel': 0, 'origin': window.location.origin },
                });
            }
            
            await updateStats(id, { views: increment(1) });
            syncRealtimeData(id);
            renderSideList(id);
            window.scrollTo(0, 0);
        };

        function syncRealtimeData(id) {
            if (unsubStats) unsubStats();
            if (unsubComments) unsubComments();

            unsubStats = onSnapshot(doc(db, "videoStats", id), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('view-count').innerText = (data.views || 0).toLocaleString();
                    document.getElementById('like-count').innerText = (data.likes || 0).toLocaleString();
                    document.getElementById('dislike-count').innerText = (data.dislikes || 0).toLocaleString();
                } else {
                    setDoc(doc(db, "videoStats", id), { views: 0, likes: 0, dislikes: 0 });
                }
            });

            const q = query(collection(db, "videos", id, "comments"), orderBy("createdAt", "desc"));
            unsubComments = onSnapshot(q, (snapshot) => {
                const comments = snapshot.docs.map(doc => doc.data());
                document.getElementById('comment-count').innerText = comments.length;
                document.getElementById('comment-list').innerHTML = comments.map(c => `
                    <div class="flex gap-4 animate-fade-in">
                        <div class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center text-xs font-bold border border-gray-700">U</div>
                        <div>
                            <div class="text-[11px] text-gray-500 font-bold mb-1">ゲストユーザー <span class="font-normal ml-2">${c.createdAt?.toDate().toLocaleString() || '投稿中...'}</span></div>
                            <p class="text-sm text-gray-200">${c.text}</p>
                        </div>
                    </div>`).join('');
            });
        }

        window.handleVote = async (type) => { if (currentId) await updateStats(currentId, { [type]: increment(1) }); };

        async function updateStats(id, data) {
            const ref = doc(db, "videoStats", id);
            try { await updateDoc(ref, data); } catch { await setDoc(ref, { views: 0, likes: 0, dislikes: 0, ...data }, { merge: true }); }
        }

        window.postComment = async () => {
            const input = document.getElementById('comment-input');
            if (!input.value.trim() || !currentId) return;
            await addDoc(collection(db, "videos", currentId, "comments"), { text: input.value, createdAt: serverTimestamp() });
            input.value = "";
        };

        window.closePlayer = () => {
            if(ytPlayer && typeof ytPlayer.stopVideo === 'function') ytPlayer.stopVideo();
            document.getElementById('player-content').classList.add('hidden');
            document.getElementById('home-content').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.searchVideos = function() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderHome(videoData.filter(v => v.title.toLowerCase().includes(q)));
        };

        function renderSideList(id) {
            document.getElementById('side-grid').innerHTML = videoData.filter(v => v.id !== id).map(v => {
                const thumbImg = v.thumb ? `<img src="${v.thumb}" class="w-full h-full object-cover">` 
                                         : `<img src="https://img.youtube.com/vi/${v.src}/mqdefault.jpg" class="w-full h-full object-cover">`;
                return `
                <div class="flex gap-3 cursor-pointer group" onclick="window.playVideo('${v.id}')">
                    <div class="w-32 h-20 flex-shrink-0 overflow-hidden rounded bg-gray-900 border border-gray-800">
                        ${thumbImg}
                    </div>
                    <div class="flex-1 text-[12px] font-bold line-clamp-2 group-hover:text-accent transition-colors">${v.title}</div>
                </div>`;
            }).join('');
        }

        window.shareVideo = () => { navigator.clipboard.writeText(window.location.href); alert("URLをコピーしました！"); };

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.searchVideos();
        });

        renderHome(videoData);
    </script>
</body>
</html>
